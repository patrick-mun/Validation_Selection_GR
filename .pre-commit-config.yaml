# Hooks pré-commit du projet Génome Réunion.
# Installation : pip install pre-commit && pre-commit install
# Exécution manuelle complète : pre-commit run --all-files
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=512]   # SAFETY: bloque l'ajout accidentel de fichiers génétiques lourds
      - id: check-merge-conflict
      - id: detect-private-key  # SAFETY: empêche de committer une clé privée
